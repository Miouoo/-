<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叫號管理</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #current { font-size: 5rem; margin: 20px; color: #2f3542; }
        button { font-size: 2rem; padding: 20px 40px; margin: 10px; cursor: pointer; border: none; border-radius: 10px; }
        .next { background-color: #2ed573; color: white; }
        .prev { background-color: #ced4da; }
    </style>
</head>
<body>
    <h1>叫號控制</h1>
    <div id="current">--</div>
    <button class="prev" onclick="change(-1)">上一號</button>
    <button class="next" onclick="change(1)">下一號</button>
    <br><br>
    <button onclick="db.set(0)">重置</button>

    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZoqXabXTdUspS-6UrT07su9Cyo_pI5Gc",
            authDomain: "queue-tcfsh121.firebaseapp.com",
            projectId: "queue-tcfsh121",
            storageBucket: "queue-tcfsh121.firebasestorage.app",
            messagingSenderId: "178038658777",
            appId: "1:178038658777:web:505b960a92beaf88ea10c8",
            databaseURL: "https://queue-tcfsh121-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("currentNumber");
        let num = 0;
        db.on("value", (snapshot) => {
            num = snapshot.val() || 0;
            document.getElementById("current").innerText = num;
        });
        function change(step) {
            db.set(num + step);
        }
    </script>
</body>
</html>
