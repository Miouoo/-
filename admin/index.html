<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>叫號管理</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding-top: 50px; }
        button { font-size: 2rem; padding: 20px; margin: 10px; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>叫號控制</h1>
    <div id="s" style="font-size: 5rem;">0</div>
    <button onclick="c(-1)">上一號</button>
    <button onclick="c(1)" style="background: #2ecc71; color: white;">下一號</button>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-database-compat.js"></script>
    <script>
        const config = {
            apiKey: "AIzaSyBZoqXabXTdUspS-6UrT07su9Cyo_pI5Gc",
            authDomain: "queue-tcfsh121.firebaseapp.com",
            projectId: "queue-tcfsh121",
            databaseURL: "https://queue-tcfsh121-default-rtdb.firebaseio.com/" // 這裡也要同步
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref("num");
        let n = 0;
        db.on("value", s => { n = s.val() || 0; document.getElementById("s").innerText = n; });
        function c(v) { db.set(n + v); }
    </script>
</body>
</html>
