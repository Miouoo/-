<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙機同步管理後台</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f4f7f6; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .preparing-zone { border-top: 8px solid #34495e; }
        .ready-zone { border-top: 8px solid #27ae60; }
        textarea { width: 90%; height: 80px; font-size: 1.2rem; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-top: 10px; }
        button { color: white; border: none; padding: 15px 30px; font-size: 1.1rem; cursor: pointer; border-radius: 5px; margin-top: 10px; width: 100%; }
        .btn-prep { background: #34495e; }
        .btn-ready { background: #27ae60; }
        .status { font-size: 0.9rem; color: #7f8c8d; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>分區叫號管理</h1>

    <div class="box preparing-zone">
        <h2>🕒 準備中號碼</h2>
        <textarea id="preparingInput" placeholder="輸入號碼..."></textarea>
        <button class="btn-prep" onclick="updateZone('preparing')">僅更新準備中</button>
        <div id="preparingStatus" class="status">同步中...</div>
    </div>

    <div class="box ready-zone">
        <h2>✅ 可取餐號碼</h2>
        <textarea id="readyInput" placeholder="輸入號碼..."></textarea>
        <button class="btn-ready" onclick="updateZone('ready')">僅更新可取餐</button>
        <div id="readyStatus" class="status">同步中...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-database-compat.js"></script>
    <script>
        const config = {
            apiKey: "AIzaSyBZoqXabXTdUspS-6UrT07su9Cyo_pI5Gc",
            authDomain: "queue-tcfsh121.firebaseapp.com",
            projectId: "queue-tcfsh121",
            databaseURL: "https://queue-tcfsh121-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

    
        db.ref("queueData/preparing").on("value", s => {
            document.getElementById("preparingInput").value = s.val() || "";
            document.getElementById("preparingStatus").innerText = "最後同步時間: " + new Date().toLocaleTimeString();
        });

        
        db.ref("queueData/ready").on("value", s => {
            document.getElementById("readyInput").value = s.val() || "";
            document.getElementById("readyStatus").innerText = "最後同步時間: " + new Date().toLocaleTimeString();
        });

        
        function updateZone(type) {
            const val = document.getElementById(type + "Input").value;
            db.ref("queueData/" + type).set(val)
              .then(() => alert(type === 'preparing' ? "準備中清單已更新" : "取餐清單已更新"))
              .catch(err => alert("更新失敗: " + err));
        }
    </script>
</body>
</html>
